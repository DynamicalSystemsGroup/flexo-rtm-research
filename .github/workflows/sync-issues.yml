# SPDX-License-Identifier: Apache-2.0
#
# Regenerate the open-issue wiki dashboards (Open Issues - Research /
# Open Issues - Implementation) whenever issues change in this repo, in
# the impl repo, on a daily cron, or on manual dispatch. If the
# regenerated markdown differs from what's checked in, commit it to
# `main` and propagate to the published GitHub wiki.
#
# Both flexo-rtm and flexo-rtm-research are public repos, so the
# default GITHUB_TOKEN covers the cross-repo issue reads (public reads
# work either unauthenticated or with any valid token; the token here
# just gets us 5000 req/hr instead of 60 req/hr). The repo's workflow
# permissions are set to "Read and write permissions" repo-wide, which
# gives GITHUB_TOKEN write access to both the main branch (for
# committing regenerated pages) and the wiki repo (which uses the same
# contents:write scope).
#
# Setup is therefore zero-config: drop the workflow in, enable Actions,
# done. No PATs to manage.
#
# Cross-repo trigger (optional): to refresh the dashboards immediately
# when an issue changes in the impl repo (rather than waiting for cron),
# paste the companion workflow snippet (at the bottom of this file)
# into the impl repo. That companion DOES need a small PAT — see the
# snippet for details — but it's an opt-in optimization.
#
# Security discipline:
#
# All user-controllable event data is routed through env vars, never
# interpolated directly into `run:` shell strings. The only ${{ }}
# substitutions inside shell context are repository identifiers and
# runner-controlled paths.

name: Sync open-issue wiki dashboards

on:
  issues:
    types:
      - opened
      - edited
      - deleted
      - transferred
      - pinned
      - unpinned
      - closed
      - reopened
      - assigned
      - unassigned
      - labeled
      - unlabeled
      - locked
      - unlocked
      - milestoned
      - demilestoned
  schedule:
    # Daily at 04:17 UTC — off the hour to avoid GitHub cron contention.
    - cron: '17 4 * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [impl-repo-issue-changed]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout published wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo

      - name: Regenerate wiki dashboards
        working-directory: main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          scripts/sync-issues-to-wiki.sh

      - name: Commit any regenerated pages to main
        id: commit
        working-directory: main
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          git config user.name "flexo-rtm-bot"
          git config user.email "flexo-rtm-bot@users.noreply.github.com"
          if [[ -z "$(git status --porcelain wiki/)" ]]; then
            echo "no_change=true" >> "$GITHUB_OUTPUT"
            echo "Wiki dashboards already in sync; nothing to commit."
            exit 0
          fi
          git add wiki/
          action_label="${EVENT_ACTION:-schedule}"
          git commit -m "docs(wiki): regenerate open-issue dashboards [automated]

          Triggered by event=${EVENT_NAME} action=${action_label}.
          Issue source of truth is GitHub; this is a published mirror."
          git push origin main
          echo "no_change=false" >> "$GITHUB_OUTPUT"

      - name: Sync to published wiki
        if: steps.commit.outputs.no_change != 'true'
        env:
          WIKI_REPO: ${{ github.workspace }}/wiki-repo
        working-directory: main
        run: |
          # sync-wiki.sh resolves WIKI_REPO from env when set,
          # otherwise falls back to <MAIN_REPO>.wiki sibling. The
          # workspace-local checkout already has its remote configured
          # with the GITHUB_TOKEN baked in via actions/checkout.
          scripts/sync-wiki.sh

# -----------------------------------------------------------------------------
# Companion workflow snippet — paste into the impl repo
# (DynamicalSystemsGroup/flexo-rtm) so its issue events fire a dispatch
# to this repo immediately rather than waiting for the daily cron. Add
# as `.github/workflows/notify-research-on-issues.yml` in the impl
# repo:
#
# ```yaml
# name: Notify research repo on issue change
# on:
#   issues:
#     types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]
# jobs:
#   dispatch:
#     runs-on: ubuntu-latest
#     steps:
#       - uses: peter-evans/repository-dispatch@v3
#         with:
#           token: ${{ secrets.RESEARCH_REPO_DISPATCH_PAT }}
#           repository: DynamicalSystemsGroup/flexo-rtm-research
#           event-type: impl-repo-issue-changed
# ```
#
# The PAT here only needs `repository_dispatch` write on this research
# repo — the default GITHUB_TOKEN can't cross repo boundaries to
# trigger workflows. The companion is purely a latency optimization;
# the cron + manual dispatch are the fallback.
